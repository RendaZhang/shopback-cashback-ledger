apiVersion: v1
kind: ConfigMap
metadata:
  name: sb-ledger-config
  namespace: sb-ledger
data:
  PORT: "3000"
  SERVICE_NAME_API: "sb-ledger-api"
  SERVICE_NAME_WORKER: "sb-ledger-worker"

  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ledger"
  POSTGRES_USER: "ledger"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  KAFKA_BROKER: "redpanda:9092"
  EVENT_TOPIC: "order.events"
  DLQ_TOPIC: "order.events.dlq"
  CONSUMER_GROUP: "sb-ledger-consumer"

  POLL_INTERVAL_MS: "1000"
  BATCH_SIZE: "50"
  MAX_ATTEMPTS: "5"
  RETRY_POLL_INTERVAL_MS: "1000"
  RETRY_BATCH_SIZE: "50"
