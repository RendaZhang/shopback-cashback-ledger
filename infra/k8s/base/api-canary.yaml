apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-canary
  namespace: sb-ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
      track: canary
  template:
    metadata:
      labels:
        app: api
        track: canary
    spec:
      containers:
        - name: api
          image: sb-ledger-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: PORT } }
            - name: SERVICE_NAME
              value: "sb-ledger-api-canary"
            - name: VERSION
              value: "v2-canary"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: sb-ledger-secret, key: DATABASE_URL } }
            - name: KAFKA_BROKER
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: KAFKA_BROKER } }
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: REDIS_PORT } }
            - name: CASHBACK_RULE_CACHE_TTL_SECONDS
              value: "60"
            - name: CASHBACK_RULE_CACHE_LOCK_MS
              value: "300"
            - name: CASHBACK_RULE_CACHE_WAIT_MS
              value: "30"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
