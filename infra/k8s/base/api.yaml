apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sb-ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: sb-ledger-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: PORT } }
            - name: SERVICE_NAME
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: SERVICE_NAME_API } }
            - name: RUN_DB_MIGRATION
              value: "true"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: sb-ledger-secret, key: DATABASE_URL } }
            - name: KAFKA_BROKER
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: KAFKA_BROKER } }
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: sb-ledger-config, key: REDIS_PORT } }
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: sb-ledger
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
